name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ── Lint ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint backend (ruff)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (eslint)
        run: |
          cd frontend
          npm run lint

  # ── Backend Tests ───────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pvadmin
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: pv_compliance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://pvadmin:testpass@localhost:5432/pv_compliance_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Test
        run: |
          cd backend
          pytest --cov=app --cov-report=xml -v

  # ── Frontend Tests ──────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Test
        run: |
          cd frontend
          npm run test

  # ── Docker Build ────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t pv-compliance-api:ci ./backend
      - name: Build frontend image
        run: docker build -t pv-compliance-frontend:ci --target prod ./frontend
