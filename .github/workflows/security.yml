name: Security Scan

on:
  schedule:
    - cron: "0 3 * * *"   # Nightly at 03:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t pv-compliance-api:scan ./backend
          docker build -t pv-compliance-frontend:scan --target prod ./frontend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pv-compliance-api:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pv-compliance-frontend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Python dependency audit
        run: |
          cd backend
          pip install pip-audit
          pip-audit --requirement <(pip freeze)
